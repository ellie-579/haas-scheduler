    // ── UTILITIES ────────────────────────────────────────────────────────────────
    function parseTime(s) {
      if (!s) return null;
      const m = s.trim().match(/(\d+)(?::(\d+))?\s*(AM|PM)/i);
      if (!m) return null;
      let h = parseInt(m[1]), min = m[2] ? parseInt(m[2]) : 0;
      const p = m[3].toUpperCase();
      if (p === 'PM' && h !== 12) h += 12;
      if (p === 'AM' && h === 12) h = 0;
      return h * 60 + min;
    }
    function parseRange(s) {
      if (!s) return null;
      const i = s.indexOf('-');
      if (i < 0) return null;
      const a = parseTime(s.slice(0, i)), b = parseTime(s.slice(i + 1));
      return a != null && b != null ? { start: a, end: b } : null;
    }
    function parseDays(s) {
      if (!s) return [];
      const special = { MTWThF:[0,1,2,3,4], TTh:[1,3], MW:[0,2], FSSu:[4,5,6], FFSSu:[4,5,6] };
      if (special[s]) return special[s];
      const r = []; let t = s;
      while (t.length) {
        if (t.startsWith('Th'))  { r.push(3); t=t.slice(2); }
        else if (t.startsWith('Su')) { r.push(6); t=t.slice(2); }
        else if (t.startsWith('M')) { r.push(0); t=t.slice(1); }
        else if (t.startsWith('T')) { r.push(1); t=t.slice(1); }
        else if (t.startsWith('W')) { r.push(2); t=t.slice(1); }
        else if (t.startsWith('F')) { r.push(4); t=t.slice(1); }
        else if (t.startsWith('S')) { r.push(5); t=t.slice(1); }
        else t = t.slice(1);
      }
      return [...new Set(r)];
    }
    function getArea(id) {
      const m = id.match(/MBA(\d+)/); if (!m) return 'other';
      const n = parseInt(m[1]);
      if (n === 212) return 'socialimpact';
      if (n >= 220 && n < 240) return 'finance';
      if (n >= 240 && n < 252) return 'operations';
      if (n >= 252 && n < 260) return 'professional';
      if (n >= 260 && n < 270) return 'marketing';
      if (n >= 270 && n < 280) return 'policy';
      if (n >= 280 && n < 290) return 'realestate';
      if (n === 290) return 'technology';
      if (n === 291) return 'professional';
      if (n === 292) return 'socialimpact';
      if (n === 295) return 'entrepreneurship';
      if (n === 296) return 'professional';
      if (n === 297) return 'healthcare';
      if (n === 299) return 'marketing';
      return 'other';
    }
    function toY(m) { return ((m - GRID_START) / 30) * SLOT_H; }
    function toH(d) { return (d / 30) * SLOT_H; }
    function fmt(m) {
      const h = Math.floor(m / 60), mn = m % 60, p = h >= 12 ? 'PM' : 'AM';
      return `${h > 12 ? h-12 : h===0?12:h}:${mn.toString().padStart(2,'0')} ${p}`;
    }

    // ── SEMESTER DATE UTILS ──────────────────────────────────────────────────────
    const SEM_START   = new Date(2025, 7, 18);  // Mon Aug 18, 2025
    const SEM_END     = new Date(2025, 11, 14); // Sun Dec 14, 2025
    const SEM_DAYS    = Math.round((SEM_END - SEM_START) / 86400000); // ~118
    const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function parseDateRange(s) {
      if (!s) return null;
      const matches = [...s.matchAll(/(\d{1,2})\/(\d{1,2})/g)];
      if (!matches.length) return null;
      const dates = matches.map(m => new Date(2025, +m[1]-1, +m[2]));
      // Handle shorthand like "11/6–7" (same month, different end day)
      const sr = s.match(/(\d{1,2})\/\d{1,2}[–\-](\d{1,2})(?!\d)/);
      if (sr) dates.push(new Date(2025, +sr[1]-1, +sr[2]));
      return { start: new Date(Math.min(...dates)), end: new Date(Math.max(...dates)) };
    }
    function fmtD(d) { return MONTH_NAMES[d.getMonth()] + ' ' + d.getDate(); }
    function semOff(d) { return Math.max(0, Math.min(SEM_DAYS, Math.round((d - SEM_START) / 86400000))); }

    function App() {
      const [selected, setSelected]       = useState(new Set());
      const [search, setSearch]           = useState('');
      const [fDay, setFDay]               = useState('');
      const [fCert, setFCert]             = useState('');
      const [fExp, setFExp]               = useState(false);
      const [fBT, setFBT]                 = useState(false);
      const [fFmt, setFFmt]               = useState('');
      const [fPriority, setFPriority]     = useState('');
      const [hovered, setHovered]         = useState(null);
      const [customCourses, setCustomCourses] = useState([]);
      const [showAddModal, setShowAddModal]   = useState(false);
      const [priorities, setPriorities]       = useState({});  // { courseId: 'P1'|'P2'|'P3' }
      const [reviewCourse, setReviewCourse]   = useState(null); // courseId to show reviews for
      const [view, setView]                   = useState('weekly'); // 'weekly' | 'timeline'

      const allCourses = useMemo(() => [...COURSES, ...customCourses], [customCourses]);

      const toggle = id => setSelected(prev => {
        const n = new Set(prev);
        n.has(id) ? n.delete(id) : n.add(id);
        return n;
      });

      const selCourses = useMemo(() => allCourses.filter(c => selected.has(c.id)), [allCourses, selected]);
      const totalUnits = useMemo(() => selCourses.reduce((s,c) => s + c.units, 0), [selCourses]);

      const conflicts = useMemo(() => {
        const set = new Set();
        const list = selCourses.filter(c => c.time && c.days);
        for (let i = 0; i < list.length; i++) {
          for (let j = i+1; j < list.length; j++) {
            const a = list[i], b = list[j];
            const shared = parseDays(a.days).filter(d => parseDays(b.days).includes(d));
            if (!shared.length) continue;
            const at = parseRange(a.time), bt = parseRange(b.time);
            if (!at || !bt) continue;
            if (at.start < bt.end && bt.start < at.end) { set.add(a.id); set.add(b.id); }
          }
        }
        return set;
      }, [selCourses]);

      const visible = useMemo(() => allCourses.filter(c => {
        if (search) {
          const q = search.toLowerCase();
          if (!c.name.toLowerCase().includes(q) && !c.id.toLowerCase().includes(q) && !c.inst.toLowerCase().includes(q)) return false;
        }
        if (fDay) {
          const dmap = { M:0,T:1,W:2,Th:3,F:4,S:5,Su:6 };
          if (!parseDays(c.days).includes(dmap[fDay])) return false;
        }
        if (fCert && !c.cert.includes(fCert)) return false;
        if (fExp && !c.exp) return false;
        if (fBT && !c.bt) return false;
        if (fFmt && c.fmt !== fFmt) return false;
        if (fPriority && priorities[c.id] !== fPriority) return false;
        return true;
      }), [allCourses, search, fDay, fCert, fExp, fBT, fFmt, fPriority, priorities]);

      const setPriority = (id, p) => setPriorities(prev => {
        const n = { ...prev };
        if (n[id] === p) delete n[id]; else n[id] = p;
        return n;
      });

      const addCourse = (course) => {
        setCustomCourses(prev => [...prev, course]);
        setSelected(prev => { const n = new Set(prev); n.add(course.id); return n; });
        setShowAddModal(false);
      };

      return (

              <div style={{ padding:'6px 12px', display:'flex', flexWrap:'wrap', gap:'4px', borderBottom:'1px solid #E2E8F0' }}>
                {Object.entries(COLORS).map(([k,c]) => (
                  <div key={k} style={{ fontSize:'10px', padding:'2px 6px', borderRadius:'3px', background:c.bg, color:c.t, border:`1px solid ${c.b}` }}>{c.label}</div>
                ))}
              </div>
              {/* Priority filter */}
              <div style={{ padding:'6px 12px', borderBottom:'1px solid #E2E8F0', display:'flex', gap:'6px', alignItems:'center' }}>
                <span style={{ fontSize:'11px', color:'#64748B', fontWeight:600 }}>Priority:</span>
                {['P1','P2','P3'].map(p => {
                  const pcol = { P1:{ bg:'#FEE2E2', t:'#B91C1C', b:'#FCA5A5' }, P2:{ bg:'#FEF3C7', t:'#92400E', b:'#FCD34D' }, P3:{ bg:'#DBEAFE', t:'#1D4ED8', b:'#93C5FD' } }[p];
                  const active = fPriority === p;
                  return (
                    <button key={p} onClick={() => setFPriority(active ? '' : p)}
                      style={{ padding:'3px 10px', borderRadius:'12px', border:`1.5px solid ${active ? pcol.b : '#E2E8F0'}`, background: active ? pcol.bg : 'white', color: active ? pcol.t : '#94A3B8', fontSize:'12px', fontWeight:700, cursor:'pointer' }}>
                      {p}
                    </button>
                  );
                })}
                {fPriority && <button onClick={() => setFPriority('')} style={{ fontSize:'11px', color:'#94A3B8', background:'none', border:'none', cursor:'pointer' }}>clear</button>}
              </div>
              {/* Course list */}
              <div style={{ flex:1, overflowY:'auto' }}>
                {visible.map(c => <CourseCard key={c.id} course={c} selected={selected.has(c.id)} conflict={conflicts.has(c.id)} hovered={hovered===c.id} priority={priorities[c.id]} onToggle={() => toggle(c.id)} onHover={setHovered} onPriority={setPriority} onReview={() => setReviewCourse(c.id)} />)}
              </div>
              {/* Add new class button */}
              <div style={{ padding:'10px 12px', borderTop:'1px solid #E2E8F0', flexShrink:0 }}>
                <button onClick={() => setShowAddModal(true)}
                  style={{ width:'100%', padding:'9px', background:'#003262', color:'white', border:'none', borderRadius:'8px', cursor:'pointer', fontSize:'13px', fontWeight:700, display:'flex', alignItems:'center', justifyContent:'center', gap:'6px' }}>
                  + Add New Class
                </button>
              </div>
            </div>

            {/* ── MAIN ── */}
            <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
              {/* View tabs */}
              <div style={{ display:'flex', background:'white', borderBottom:'2px solid #E2E8F0', flexShrink:0 }}>
                {[['weekly','📅 Weekly Schedule'],['timeline','📊 Semester Timeline']].map(([v,lbl]) => (
                  <button key={v} onClick={() => setView(v)}
                    style={{ padding:'8px 20px', fontSize:'13px', fontWeight:700, border:'none', borderBottom: v===view ? '2px solid #003262' : '2px solid transparent', cursor:'pointer', background:'white', color: v===view ? '#003262' : '#64748B', marginBottom:'-2px' }}>
                    {lbl}
                  </button>
                ))}
              </div>
              {view === 'weekly'
                ? <ScheduleGrid courses={selCourses} conflicts={conflicts} hovered={hovered} onRemove={toggle} priorities={priorities} />
                : <SemesterTimeline courses={selCourses} conflicts={conflicts} priorities={priorities} />
              }
            </div>
          </div>

          {/* ── ADD MODAL ── */}
          {showAddModal && <AddCourseModal onAdd={addCourse} onClose={() => setShowAddModal(false)} existingCount={customCourses.length} />}
          {/* ── REVIEWS MODAL ── */}
          {reviewCourse && <ReviewsModal courseId={reviewCourse} courses={allCourses} onClose={() => setReviewCourse(null)} />}
        </div>
      );
    }

    const selStyle = { fontSize:'12px', padding:'4px 6px', border:'1px solid #CBD5E1', borderRadius:'4px', background:'white', cursor:'pointer' };

    // ── PRIORITY CONFIG ───────────────────────────────────────────────────────────
    const PCOLS = {
      P1: { bg:'#FEE2E2', t:'#B91C1C', b:'#FCA5A5', label:'P1' },
      P2: { bg:'#FEF3C7', t:'#92400E', b:'#FCD34D', label:'P2' },
      P3: { bg:'#DBEAFE', t:'#1D4ED8', b:'#93C5FD', label:'P3' },
    };

    // ── COURSE CARD ───────────────────────────────────────────────────────────────
    function CourseCard({ course: c, selected, conflict, hovered, priority, onToggle, onHover, onPriority, onReview }) {
      const col = COLORS[getArea(c.id)];
      const rev = REVIEWS[c.id];
      return (
        <div onMouseEnter={() => onHover(c.id)} onMouseLeave={() => onHover(null)}
          style={{ padding:'9px 12px', borderBottom:'1px solid #F1F5F9', transition:'background 0.1s',
            background: selected ? col.bg : hovered ? '#F8FAFC' : 'white',
            borderLeft: `3px solid ${selected ? col.b : 'transparent'}` }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:'8px' }}>
            <div style={{ flex:1, minWidth:0, cursor:'pointer' }} onClick={onToggle}>
              <div style={{ display:'flex', alignItems:'center', gap:'5px', marginBottom:'3px', flexWrap:'wrap' }}>
                <span style={{ fontSize:'10px', fontWeight:700, color:col.t, background:col.bg, padding:'1px 5px', borderRadius:'3px', border:`1px solid ${col.b}`, whiteSpace:'nowrap' }}>{c.id}</span>
                <span style={{ fontSize:'11px', color:'#64748B', whiteSpace:'nowrap' }}>{c.units}u</span>
                {conflict && <span style={{ fontSize:'10px', color:'#DC2626', fontWeight:600 }}>⚠ conflict</span>}
                {c.notes && c.notes.includes('New') && <span style={{ fontSize:'10px', color:'#16A34A', background:'#DCFCE7', padding:'1px 4px', borderRadius:'3px', border:'1px solid #86EFAC' }}>NEW</span>}
              </div>
              <div style={{ fontSize:'13px', fontWeight:600, color:'#1E293B', lineHeight:1.3, marginBottom:'2px' }}>{c.name}</div>
              <div style={{ fontSize:'11px', color:'#64748B' }}>{c.inst}</div>
              <div style={{ fontSize:'11px', color:'#94A3B8', marginTop:'2px', display:'flex', gap:'8px', flexWrap:'wrap' }}>
                <span><b>{c.days}</b> · {c.time}</span>
                <span>{c.fmt}{c.dates ? ` · ${c.dates}` : ''}</span>
              </div>
              <div style={{ display:'flex', gap:'5px', marginTop:'3px', flexWrap:'wrap' }}>
                {c.cert && c.cert !== 'N/A' && c.cert !== '' && c.cert.split(',').map(ct => (
                  <span key={ct} style={{ fontSize:'10px', color:'#7C3AED', background:'#F3E8FF', padding:'1px 5px', borderRadius:'3px', border:'1px solid #C4B5FD' }}>📜 {ct.trim()}</span>
                ))}
                {c.exp && <span style={{ fontSize:'10px', color:'#059669', background:'#DCFCE7', padding:'1px 5px', borderRadius:'3px', border:'1px solid #6EE7B7' }}>⭐ Exp</span>}
                {c.bt && <span style={{ fontSize:'10px', color:'#2563EB', background:'#DBEAFE', padding:'1px 5px', borderRadius:'3px', border:'1px solid #93C5FD' }}>💻 B&T</span>}
                {c.xlist && c.xlist !== 'No' && <span style={{ fontSize:'10px', color:'#64748B', background:'#F1F5F9', padding:'1px 5px', borderRadius:'3px' }}>{c.xlist}</span>}
              </div>
              {/* Review scores */}
              {rev && (
                <div style={{ marginTop:'6px', display:'flex', alignItems:'center', gap:'8px', flexWrap:'wrap' }}>
                  <RatingBar label="Worth" value={rev.courseWorth} color="#22C55E" />
                  <RatingBar label="Prof" value={rev.instructorEffectiveness} color="#3B82F6" />
                  <RatingBar label="Diff" value={rev.difficulty} color="#F97316" />
                  <button onClick={e => { e.stopPropagation(); onReview(); }}
                    style={{ fontSize:'10px', color:'#6366F1', background:'#EEF2FF', border:'1px solid #C7D2FE', borderRadius:'4px', padding:'1px 6px', cursor:'pointer', marginLeft:'2px' }}>
                    💬 {rev.comments && rev.comments.length > 0 ? `${rev.responses || rev.comments.length} comments` : 'scores'}
                  </button>
                </div>
              )}
            </div>
            {/* Right column: select circle + priority buttons */}
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:'6px', flexShrink:0 }}>
              <div onClick={onToggle} style={{ width:'20px', height:'20px', borderRadius:'50%', border:`2px solid ${selected ? col.b : '#CBD5E1'}`, background: selected ? col.b : 'transparent', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', marginTop:'2px' }}>
                {selected && <span style={{ color:'white', fontSize:'11px', lineHeight:1, fontWeight:700 }}>✓</span>}
              </div>
              <div style={{ display:'flex', flexDirection:'column', gap:'3px' }}>
                {['P1','P2','P3'].map(p => {
                  const pc = PCOLS[p];
                  const active = priority === p;
                  return (
                    <button key={p} onClick={e => { e.stopPropagation(); onPriority(c.id, p); }}
                      title={`Mark as ${p}`}
                      style={{ width:'24px', height:'18px', borderRadius:'4px', border:`1.5px solid ${active ? pc.b : '#E2E8F0'}`, background: active ? pc.bg : 'white', color: active ? pc.t : '#CBD5E1', fontSize:'9px', fontWeight:800, cursor:'pointer', padding:0, lineHeight:1 }}>
                      {p}
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── SCHEDULE GRID ─────────────────────────────────────────────────────────────
    function ScheduleGrid({ courses, conflicts, hovered, onRemove, priorities }) {
      const timeLabels = [];
      for (let m = GRID_START; m <= GRID_END; m += 60) timeLabels.push(m);

      const gridLines = [];
      for (let i = 0; i <= TOTAL_SLOTS; i++) gridLines.push({ y: i * SLOT_H, isHour: i % 2 === 0 });

      // Build blocks: one per (course × day)
      const blocks = [];
      courses.forEach(c => {
        if (!c.time || !c.days) return;
        const tr = parseRange(c.time); if (!tr) return;
        parseDays(c.days).forEach(di => blocks.push({ c, di, tr, col: COLORS[getArea(c.id)] }));
      });

      const emptyMsg = courses.length === 0;

      return (
        <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
          {/* Day headers */}
          <div style={{ display:'flex', borderBottom:'2px solid #E2E8F0', background:'white', flexShrink:0 }}>
            <div style={{ width:'52px', flexShrink:0 }} />
            {DAYS.map((d, i) => (
              <div key={d} style={{ flex: i < 5 ? 1.2 : 0.7, textAlign:'center', padding:'8px 4px', fontSize:'12px', fontWeight:700, color:'#475569', letterSpacing:'0.05em', textTransform:'uppercase', borderLeft:'1px solid #E2E8F0' }}>{d}</div>
            ))}
          </div>

          {/* Grid body */}
          <div style={{ flex:1, overflowY:'auto', display:'flex', position:'relative' }}>
            {emptyMsg && (
              <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', pointerEvents:'none', zIndex:5 }}>
                <div style={{ textAlign:'center', color:'#94A3B8' }}>
                  <div style={{ fontSize:'36px', marginBottom:'8px' }}>📅</div>
                  <div style={{ fontSize:'15px', fontWeight:600 }}>Select courses from the left panel</div>
                  <div style={{ fontSize:'13px', marginTop:'4px' }}>They'll appear on the weekly grid</div>
                </div>
              </div>
            )}
            {/* Time labels */}
            <div style={{ width:'52px', position:'relative', height:`${GRID_H}px`, flexShrink:0 }}>
              {timeLabels.map(m => (
                <div key={m} style={{ position:'absolute', top:`${toY(m)}px`, right:'6px', fontSize:'10px', color:'#94A3B8', transform:'translateY(-50%)', whiteSpace:'nowrap' }}>{fmt(m)}</div>
              ))}
            </div>
            {/* Day columns */}
            {DAYS.map((d, di) => (
              <div key={di} style={{ flex: di < 5 ? 1.2 : 0.7, position:'relative', height:`${GRID_H}px`, borderLeft:'1px solid #E2E8F0' }}>
                {gridLines.map((l,i) => (
                  <div key={i} style={{ position:'absolute', top:`${l.y}px`, left:0, right:0, borderTop: l.isHour ? '1px solid #E2E8F0' : '1px dashed #F1F5F9', pointerEvents:'none' }} />
                ))}
                {blocks.filter(b => b.di === di).map(b => {
                  const top = toY(b.tr.start);
                  const h   = Math.max(toH(b.tr.end - b.tr.start), SLOT_H * 0.8);
                  const isC = conflicts.has(b.c.id);
                  const isH = hovered === b.c.id;
                  return (
                    <div key={`${b.c.id}-${di}`} onClick={() => onRemove(b.c.id)}
                      title={`${b.c.name}\n${b.c.days} ${b.c.time}\n${b.c.fmt} · ${b.c.dates}\nClick to remove`}
                      style={{ position:'absolute', top:`${top+1}px`, left:'2px', right:'2px', height:`${h-2}px`,
                        background: isC ? '#FEE2E2' : b.col.bg,
                        borderLeft:`3px solid ${isC ? '#EF4444' : b.col.b}`,
                        borderRadius:'4px', padding:'3px 5px', fontSize:'10px', lineHeight:1.25,
                        overflow:'hidden', cursor:'pointer', zIndex: isH ? 10 : 1,
                        boxShadow: isH ? '0 2px 12px rgba(0,0,0,0.2)' : '0 1px 2px rgba(0,0,0,0.06)',
                        transition:'box-shadow 0.1s', opacity: isH ? 0.9 : 1 }}>
                      <div style={{ display:'flex', alignItems:'center', gap:'3px', overflow:'hidden' }}>
                        {priorities && priorities[b.c.id] && (() => { const pc = PCOLS[priorities[b.c.id]]; return <span style={{ fontSize:'8px', fontWeight:800, color:pc.t, background:pc.bg, border:`1px solid ${pc.b}`, borderRadius:'2px', padding:'0 3px', flexShrink:0 }}>{priorities[b.c.id]}</span>; })()}
                        <div style={{ fontWeight:700, color: isC ? '#B91C1C' : b.col.t, overflow:'hidden', whiteSpace:'nowrap', textOverflow:'ellipsis' }}>{b.c.name}</div>
                      </div>
                      {h > 32 && <div style={{ color:'#64748B', overflow:'hidden', whiteSpace:'nowrap', textOverflow:'ellipsis' }}>{b.c.time}</div>}
                      {h > 50 && <div style={{ color:'#94A3B8', overflow:'hidden', whiteSpace:'nowrap', textOverflow:'ellipsis' }}>{b.c.inst}</div>}
                      {isC && h > 18 && <div style={{ color:'#DC2626', fontSize:'9px', fontWeight:700 }}>⚠ CONFLICT</div>}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>

          {/* Selected courses summary */}
          {courses.length > 0 && (
            <div style={{ background:'white', borderTop:'1px solid #E2E8F0', padding:'8px 16px', flexShrink:0, maxHeight:'120px', overflowY:'auto' }}>
              <div style={{ fontSize:'11px', fontWeight:700, color:'#475569', marginBottom:'5px', textTransform:'uppercase', letterSpacing:'0.05em' }}>
                Selected — {courses.reduce((s,c)=>s+c.units,0)} units total
              </div>
              <div style={{ display:'flex', flexWrap:'wrap', gap:'5px' }}>
                {courses.map(c => {
                  const col = COLORS[getArea(c.id)];
                  const p = priorities && priorities[c.id];
                  const pc = p && PCOLS[p];
                  return (
                    <div key={c.id} onClick={() => onRemove(c.id)}
                      title="Click to remove"
                      style={{ display:'flex', alignItems:'center', gap:'5px', padding:'3px 8px', borderRadius:'20px', background:col.bg, border:`1px solid ${col.b}`, cursor:'pointer', fontSize:'11px' }}>
                      {p && <span style={{ fontWeight:800, color:pc.t, background:pc.bg, border:`1px solid ${pc.b}`, borderRadius:'3px', padding:'0 4px', fontSize:'10px' }}>{p}</span>}
                      <span style={{ fontWeight:700, color:col.t }}>{c.id}</span>
                      <span style={{ color:'#64748B' }}>{c.units}u</span>
                      {conflicts.has(c.id) && <span style={{ color:'#DC2626' }}>⚠</span>}
                      <span style={{ color:'#94A3B8', fontSize:'10px' }}>×</span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── SEMESTER TIMELINE ─────────────────────────────────────────────────────────
    function SemesterTimeline({ courses, conflicts, priorities }) {
      const LABEL_W = 150;
      const ROW_H   = 26;

      const monthMarkers = [8,9,10,11].map(m => ({ d: new Date(2025,m,1), label: MONTH_NAMES[m] }));
      const weekMarkers = [];
      let wd = new Date(SEM_START);
      while (wd <= SEM_END) { weekMarkers.push(new Date(wd)); wd = new Date(wd.getTime() + 7*86400000); }

      if (!courses.length) return (
        <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <div style={{ textAlign:'center', color:'#94A3B8' }}>
            <div style={{ fontSize:'36px', marginBottom:'8px' }}>📊</div>
            <div style={{ fontSize:'15px', fontWeight:600 }}>Select courses to see the semester timeline</div>
            <div style={{ fontSize:'13px', marginTop:'4px' }}>Each course bar shows its actual run dates</div>
          </div>
        </div>
      );

      return (
        <div style={{ flex:1, overflowY:'auto', padding:'16px', background:'#F8FAFC' }}>
          <div style={{ background:'white', borderRadius:'10px', border:'1px solid #E2E8F0', overflow:'hidden' }}>
            <div style={{ background:'#003262', color:'white', padding:'10px 16px', fontSize:'13px', fontWeight:700 }}>
              Fall 2025 Semester · Aug 18 – Dec 14 · {courses.reduce((s,c)=>s+c.units,0)} units selected
            </div>
            <div style={{ padding:'16px 20px', overflowX:'auto' }}>
              <div style={{ minWidth:'500px' }}>
                {/* Month labels row */}
                <div style={{ marginLeft:`${LABEL_W}px`, position:'relative', height:'18px', marginBottom:'2px' }}>
                  <div style={{ position:'absolute', left:'0%', fontSize:'11px', fontWeight:700, color:'#475569' }}>Aug</div>
                  {monthMarkers.map(({d,label}) => (
                    <div key={label} style={{ position:'absolute', left:`${(semOff(d)/SEM_DAYS)*100}%`, fontSize:'11px', fontWeight:700, color:'#475569', transform:'translateX(-3px)' }}>{label}</div>
                  ))}
                </div>
                {/* Week tick marks */}
                <div style={{ marginLeft:`${LABEL_W}px`, position:'relative', height:'8px', marginBottom:'10px', borderBottom:'1px solid #CBD5E1' }}>
                  {weekMarkers.map((w,i) => (
                    <div key={i} style={{ position:'absolute', left:`${(semOff(w)/SEM_DAYS)*100}%`, bottom:0, height:'5px', width:'1px', background:'#CBD5E1' }} />
                  ))}
                </div>
                {/* Course rows */}
                {courses.map(c => {
                  const col  = COLORS[getArea(c.id)];
                  const p    = priorities && priorities[c.id];
                  const pc   = p && PCOLS[p];
                  const dr   = parseDateRange(c.dates);
                  const isC  = conflicts.has(c.id);
                  const startPct = dr ? (semOff(dr.start)/SEM_DAYS)*100 : null;
                  const widthPct = dr ? Math.max((semOff(dr.end)-semOff(dr.start))/SEM_DAYS*100, 0.8) : null;
                  const sameDay  = dr && dr.start.getTime()===dr.end.getTime();

                  return (
                    <div key={c.id} style={{ display:'flex', alignItems:'center', height:`${ROW_H}px`, marginBottom:'4px' }}>
                      {/* Course label */}
                      <div style={{ width:`${LABEL_W}px`, flexShrink:0, paddingRight:'10px', display:'flex', alignItems:'center', gap:'4px', overflow:'hidden' }}>
                        {p && <span style={{ fontSize:'9px', fontWeight:800, color:pc.t, background:pc.bg, border:`1px solid ${pc.b}`, borderRadius:'2px', padding:'0 3px', flexShrink:0 }}>{p}</span>}
                        <span style={{ fontSize:'11px', color:'#1E293B', fontWeight:600, overflow:'hidden', whiteSpace:'nowrap', textOverflow:'ellipsis', flex:1 }} title={c.name}>{c.name}</span>
                        <span style={{ fontSize:'10px', color:'#94A3B8', flexShrink:0, marginLeft:'2px' }}>{c.units}u</span>
                      </div>
                      {/* Timeline track */}
                      <div style={{ flex:1, position:'relative', height:'18px', background:'#F1F5F9', borderRadius:'4px', overflow:'hidden' }}>
                        {weekMarkers.map((w,i) => (
                          <div key={i} style={{ position:'absolute', left:`${(semOff(w)/SEM_DAYS)*100}%`, top:0, bottom:0, width:'1px', background:'white' }} />
                        ))}
                        {dr ? (
                          <div title={`${c.name}\n${fmtD(dr.start)}${sameDay?'':' – '+fmtD(dr.end)}\n${c.days} · ${c.time}`}
                            style={{ position:'absolute', left:`${startPct}%`, width:`${widthPct}%`, top:'1px', bottom:'1px',
                              background: isC ? '#FCA5A5' : col.bg,
                              border:`1.5px solid ${isC ? '#EF4444' : col.b}`,
                              borderRadius:'3px', display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden' }}>
                            <span style={{ fontSize:'9px', color: isC ? '#B91C1C' : col.t, fontWeight:700, whiteSpace:'nowrap', padding:'0 4px' }}>
                              {fmtD(dr.start)}{sameDay ? '' : ` – ${fmtD(dr.end)}`}
                            </span>
                          </div>
                        ) : (
                          <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', paddingLeft:'6px' }}>
                            <span style={{ fontSize:'9px', color:'#94A3B8' }}>{c.dates || 'Dates TBD'}</span>
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
            <div style={{ padding:'8px 16px', borderTop:'1px solid #E2E8F0', fontSize:'10px', color:'#94A3B8', display:'flex', gap:'16px', flexWrap:'wrap' }}>
              <span>Fall 2025: Aug 18 – Dec 14</span>
              <span>Each tick mark = 1 week</span>
              <span>Hover bars for details</span>
            </div>
          </div>
        </div>
      );
    }

    // ── RATING BAR ────────────────────────────────────────────────────────────────
    function RatingBar({ label, value, color }) {
      const pct = (value / 7) * 100;
      return (
        <div style={{ display:'flex', alignItems:'center', gap:'4px' }}>
          <span style={{ fontSize:'9px', color:'#94A3B8', fontWeight:600, width:'26px' }}>{label}</span>
          <div style={{ width:'40px', height:'5px', background:'#F1F5F9', borderRadius:'3px', overflow:'hidden' }}>
            <div style={{ width:`${pct}%`, height:'100%', background:color, borderRadius:'3px' }} />
          </div>
          <span style={{ fontSize:'10px', color:'#475569', fontWeight:700 }}>{value.toFixed(1)}</span>
        </div>
      );
    }

    // ── REVIEWS MODAL ─────────────────────────────────────────────────────────────
    function ReviewsModal({ courseId, courses, onClose }) {
      const course = courses.find(c => c.id === courseId);
      const rev = REVIEWS[courseId];
      if (!course || !rev) return null;
      const col = COLORS[getArea(courseId)];

      return (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.45)', zIndex:100, display:'flex', alignItems:'center', justifyContent:'center' }}
          onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div style={{ background:'white', borderRadius:'12px', width:'560px', maxWidth:'95vw', maxHeight:'85vh', display:'flex', flexDirection:'column', boxShadow:'0 20px 60px rgba(0,0,0,0.25)', overflow:'hidden' }}>
            {/* Header */}
            <div style={{ background:'#003262', color:'white', padding:'14px 20px', display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
              <div>
                <div style={{ fontSize:'11px', opacity:0.7, marginBottom:'2px' }}>{courseId} · {rev.term}</div>
                <div style={{ fontSize:'15px', fontWeight:800 }}>{course.name}</div>
                <div style={{ fontSize:'12px', opacity:0.8, marginTop:'2px' }}>{course.inst}</div>
              </div>
              <button onClick={onClose} style={{ background:'none', border:'none', color:'white', fontSize:'20px', cursor:'pointer', lineHeight:1, padding:'0 4px', marginTop:'-2px' }}>×</button>
            </div>
            {/* Score cards */}
            <div style={{ display:'flex', gap:0, borderBottom:'1px solid #E2E8F0' }}>
              {[
                { label:'Course Worth', value:rev.courseWorth, color:'#22C55E', bg:'#DCFCE7', sub:'out of 7' },
                { label:'Instructor', value:rev.instructorEffectiveness, color:'#3B82F6', bg:'#DBEAFE', sub:'effectiveness' },
                { label:'Difficulty', value:rev.difficulty, color:'#F97316', bg:'#FFEDD5', sub:'out of 7' },
              ].map(m => (
                <div key={m.label} style={{ flex:1, padding:'14px 16px', textAlign:'center', background:m.bg, borderRight:'1px solid #E2E8F0' }}>
                  <div style={{ fontSize:'28px', fontWeight:900, color:m.color }}>{m.value.toFixed(2)}</div>
                  <div style={{ fontSize:'12px', fontWeight:700, color:'#374151', marginTop:'2px' }}>{m.label}</div>
                  <div style={{ fontSize:'10px', color:'#9CA3AF' }}>{m.sub}</div>
                  <div style={{ marginTop:'6px', height:'6px', background:'rgba(255,255,255,0.6)', borderRadius:'3px', overflow:'hidden' }}>
                    <div style={{ width:`${(m.value/7)*100}%`, height:'100%', background:m.color, borderRadius:'3px' }} />
                  </div>
                </div>
              ))}
              <div style={{ flex:1, padding:'14px 16px', textAlign:'center', background:'#F8FAFC' }}>
                <div style={{ fontSize:'28px', fontWeight:900, color:'#6366F1' }}>{rev.responses}</div>
                <div style={{ fontSize:'12px', fontWeight:700, color:'#374151', marginTop:'2px' }}>Responses</div>
                <div style={{ fontSize:'10px', color:'#9CA3AF' }}>{rev.term}</div>
              </div>
            </div>
            {/* Comments */}
            <div style={{ flex:1, overflowY:'auto', padding:'16px 20px' }}>
              <div style={{ fontSize:'12px', fontWeight:700, color:'#475569', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:'10px' }}>
                Student Comments — Would you recommend this course?
              </div>
              {rev.comments && rev.comments.length > 0 ? rev.comments.map((comment, i) => (
                <div key={i} style={{ padding:'10px 12px', marginBottom:'8px', background:'#F8FAFC', borderRadius:'8px', borderLeft:'3px solid #E2E8F0', fontSize:'13px', color:'#374151', lineHeight:1.5 }}>
                  "{comment}"
                </div>
              )) : (
                <div style={{ padding:'16px', textAlign:'center', color:'#94A3B8', background:'#F8FAFC', borderRadius:'8px' }}>
                  <div style={{ fontSize:'24px', marginBottom:'8px' }}>💬</div>
                  <div style={{ fontSize:'13px', fontWeight:600 }}>No comments loaded yet</div>
                  <div style={{ fontSize:'12px', marginTop:'4px' }}>On the Teaching Evaluations site, click <b>view</b> under Qualitative Comments for this course, then save the PDF and share it here.</div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ── ADD COURSE MODAL ──────────────────────────────────────────────────────────
    function AddCourseModal({ onAdd, onClose, existingCount }) {
      const [form, setForm] = useState({
        name:'', id:'', units:'3', inst:'', days:[], startTime:'', endTime:'', fmt:'15 weeks', notes:''
      });
      const [error, setError] = useState('');

      const DAY_OPTS = ['M','T','W','Th','F','S','Su'];
      const DAY_LABELS = { M:'Mon', T:'Tue', W:'Wed', Th:'Thu', F:'Fri', S:'Sat', Su:'Sun' };

      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const toggleDay = (d) => set('days', form.days.includes(d) ? form.days.filter(x=>x!==d) : [...form.days, d]);

      // Build a day string like "MW" or "TTh" from array
      const buildDayStr = (arr) => {
        const order = ['M','T','W','Th','F','S','Su'];
        return order.filter(d => arr.includes(d)).join('');
      };

      const submit = () => {
        if (!form.name.trim()) return setError('Course name is required.');
        if (!form.days.length) return setError('Select at least one day.');
        if (!form.startTime || !form.endTime) return setError('Start and end times are required.');
        const [sh,sm] = form.startTime.split(':').map(Number);
        const [eh,em] = form.endTime.split(':').map(Number);
        if (sh*60+sm >= eh*60+em) return setError('End time must be after start time.');

        const toAmPm = (h,m) => {
          const p = h >= 12 ? 'PM' : 'AM';
          const h12 = h > 12 ? h-12 : h===0 ? 12 : h;
          return `${h12}:${m.toString().padStart(2,'0')}${p}`;
        };
        const timeStr = `${toAmPm(sh,sm)}-${toAmPm(eh,em)}`;
        const id = form.id.trim() || `CUSTOM-${existingCount + 1}`;

        onAdd({
          id, name: form.name.trim(), units: parseInt(form.units)||3,
          inst: form.inst.trim() || 'TBD',
          days: buildDayStr(form.days),
          time: timeStr, fmt: form.fmt, dates:'', xlist:'', notes: form.notes.trim(),
          exp:false, bt:false, noDrop:false, cert:'', fn:'', ind:''
        });
      };

      const inputStyle = { width:'100%', padding:'7px 9px', border:'1px solid #CBD5E1', borderRadius:'6px', fontSize:'13px', outline:'none', boxSizing:'border-box' };

      return (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.45)', zIndex:100, display:'flex', alignItems:'center', justifyContent:'center' }}
          onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div style={{ background:'white', borderRadius:'12px', width:'460px', maxWidth:'95vw', boxShadow:'0 20px 60px rgba(0,0,0,0.25)', overflow:'hidden' }}>
            {/* Modal header */}
            <div style={{ background:'#003262', color:'white', padding:'14px 20px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <span style={{ fontWeight:800, fontSize:'15px' }}>Add New Class</span>
              <button onClick={onClose} style={{ background:'none', border:'none', color:'white', fontSize:'20px', cursor:'pointer', lineHeight:1, padding:'0 4px' }}>×</button>
            </div>
            {/* Form */}
            <div style={{ padding:'16px 20px', display:'flex', flexDirection:'column', gap:'12px', maxHeight:'70vh', overflowY:'auto' }}>
              {error && <div style={{ background:'#FEE2E2', color:'#B91C1C', padding:'8px 12px', borderRadius:'6px', fontSize:'13px' }}>{error}</div>}

              <div>
                <label style={{ fontSize:'12px', fontWeight:600, color:'#475569', display:'block', marginBottom:'4px' }}>Course Name *</label>
                <input style={inputStyle} placeholder="e.g. Advanced Corporate Finance" value={form.name} onChange={e => set('name', e.target.value)} />
              </div>

              <div style={{ display:'flex', gap:'10px' }}>
                <div style={{ flex:1 }}>
                  <label style={{ fontSize:'12px', fontWeight:600, color:'#475569', display:'block', marginBottom:'4px' }}>Course ID</label>
                  <input style={inputStyle} placeholder="e.g. MBA299X-1" value={form.id} onChange={e => set('id', e.target.value)} />
                </div>
                <div style={{ width:'80px' }}>
                  <label style={{ fontSize:'12px', fontWeight:600, color:'#475569', display:'block', marginBottom:'4px' }}>Units</label>
                  <select value={form.units} onChange={e => set('units', e.target.value)} style={{ ...inputStyle }}>
                    {[1,2,3,4].map(u => <option key={u} value={u}>{u}</option>)}
                  </select>
                </div>
              </div>

              <div>
                <label style={{ fontSize:'12px', fontWeight:600, color:'#475569', display:'block', marginBottom:'4px' }}>Instructor</label>
                <input style={inputStyle} placeholder="e.g. Smith, J." value={form.inst} onChange={e => set('inst', e.target.value)} />
              </div>

              <div>
                <label style={{ fontSize:'12px', fontWeight:600, color:'#475569', display:'block', marginBottom:'6px' }}>Days *</label>
                <div style={{ display:'flex', gap:'6px', flexWrap:'wrap' }}>
                  {DAY_OPTS.map(d => {
                    const on = form.days.includes(d);
                    return (
                      <button key={d} type="button" onClick={() => toggleDay(d)}
                        style={{ padding:'5px 12px', borderRadius:'6px', border:`1.5px solid ${on ? '#003262' : '#CBD5E1'}`, background: on ? '#003262' : 'white', color: on ? 'white' : '#475569', fontSize:'12px', fontWeight:600, cursor:'pointer' }}>
                        {DAY_LABELS[d]}
                      </button>
                    );
                  })}
                </div>
              </div>

              <div style={{ display:'flex', gap:'10px' }}>
                <div style={{ flex:1 }}>
                  <label style={{ fontSize:'12px', fontWeight:600, color:'#475569', display:'block', marginBottom:'4px' }}>Start Time *</label>
                  <input type="time" style={inputStyle} value={form.startTime} onChange={e => set('startTime', e.target.value)} />
                </div>
                <div style={{ flex:1 }}>
                  <label style={{ fontSize:'12px', fontWeight:600, color:'#475569', display:'block', marginBottom:'4px' }}>End Time *</label>
                  <input type="time" style={inputStyle} value={form.endTime} onChange={e => set('endTime', e.target.value)} />
                </div>
              </div>

              <div>
                <label style={{ fontSize:'12px', fontWeight:600, color:'#475569', display:'block', marginBottom:'4px' }}>Format</label>
                <select value={form.fmt} onChange={e => set('fmt', e.target.value)} style={inputStyle}>
                  <option value="15 weeks">15 Weeks</option>
                  <option value="10 Weeks">10 Weeks</option>
                  <option value="7 Weeks">7 Weeks</option>
                  <option value="Block Week">Block Week</option>
                  <option value="2 Sundays">2 Sundays</option>
                  <option value="Saturdays">Saturdays</option>
                  <option value="Full weekend">Full Weekend</option>
                  <option value="Other">Other</option>
                </select>
              </div>

              <div>
                <label style={{ fontSize:'12px', fontWeight:600, color:'#475569', display:'block', marginBottom:'4px' }}>Notes</label>
                <input style={inputStyle} placeholder="Optional notes" value={form.notes} onChange={e => set('notes', e.target.value)} />
              </div>
            </div>
            {/* Footer */}
            <div style={{ padding:'12px 20px', borderTop:'1px solid #E2E8F0', display:'flex', gap:'8px', justifyContent:'flex-end' }}>
              <button onClick={onClose} style={{ padding:'8px 16px', border:'1px solid #CBD5E1', borderRadius:'6px', background:'white', cursor:'pointer', fontSize:'13px', color:'#475569' }}>Cancel</button>
              <button onClick={submit} style={{ padding:'8px 20px', border:'none', borderRadius:'6px', background:'#003262', color:'white', cursor:'pointer', fontSize:'13px', fontWeight:700 }}>Add to Schedule</button>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
